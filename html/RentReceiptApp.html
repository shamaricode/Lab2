<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rent Receipt Generator</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

<link rel="stylesheet" href="../css/Receipt.css">

</head>

<body>

<main class="container">

<header>
<h1>
<span class="material-icons header-icon">receipt</span>
Rent Receipt
</h1>
</header>


<form id="receipt">

<div class="field">
<label for="tenantName">Tenant Name</label>
<input type="text" id="tenantName" required>
</div>

<div class="field">
<label for="landlordName">Landlord Name</label>
<input type="text" id="landlordName" required>
</div>


<div class="field">
<label for="email">Email</label>
<input type="email" id="email" required>
</div>

<div class="field">
<label for="phone">Phone</label>
<input type="tel" id="phone" required>
</div>


<div class="field">
<label for="address">Property Address</label>
<input type="text" id="address" required>
</div>

<div class="field">
<label for="unit">Unit</label>
<input type="number" id="unit" required>
</div>


<div class="field">
<label for="amount">Amount (USD)</label>
<input type="number" id="amount" required>
</div>

<div class="field">
<label for="paymentdate">Payment Date</label>
<input type="date" id="paymentdate" required>
</div>


<div class="field">
<label for="periodfrom">Rent Period From</label>
<input type="date" id="periodfrom" required>
</div>

<div class="field">
<label for="periodto">To</label>
<input type="date" id="periodto" required>
</div>


<div class="field">
<label for="paymentMethod">Payment Method</label>

<select id="paymentMethod">

<option disabled selected>Select Payment Method</option>
<option>Cash</option>
<option>Cheque</option>
<option>Bank Transfer</option>

</select>
</div>

<div class="field">
<label for="receiptId">Receipt ID</label>
<input type="text" id="receiptId" placeholder="RCPT-001">
</div>


<div class="field full">
<label for="note">Note</label>
<input type="text" id="note">
</div>


<div class="field full">
<label for="signature">Signature</label>
<input type="text" id="signature">
</div>


<div class="buttons full">

<button type="button">Generate</button>
<button type="button">Print</button>
<button type="button">Download</button>

</div>

</form>


<section id="receiptDisplay" class="receipt"></section>

</main>

</body>
</html>
